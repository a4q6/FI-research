  - key: jsda_monthend
    title: 日証協 公社債店頭売買参考統計値（月末スナップショット）
    category: International
    provider: 日本証券業協会
    loader: fi_research.data.jsda.load_monthend
    files: ["jsda_monthend_*.parquet"]
    frequency: 月末日次（日次原データを月末抽出）
    upstream_url: https://market.jsda.or.jp/shijyo/saiken/baibai/baisanchi/files/{YYYY}/S{YYMMDD}.csv
    citation: "日本証券業協会 (JSDA), 公社債店頭売買参考統計値。"
    license: public（再配布は出典明記要）
    caveats:
      - "CSV は cp932 (Shift-JIS) エンコーディング、ヘッダー無し 29 列。"
      - "API 無し、daily CSV を直接スクレイピング。サーバ rate-limit (3+ sec sleep 必要)。"
      - "S{YYMMDD}.csv 形式の URL は ~2019 年以降確認、それ以前は別形式の可能性（archive ページ参照）。"
      - "個別社債識別子 (col `code`) は 9 桁、ISIN/CUSIP 互換ではない JSDA 独自コード。"
    usage: {A1: edge, A2: core}
    relations:
      - to: mof_japan_jgb
        kind: shared-date
        from: date
        on: date
      - to: jsda_matrix_monthend
        kind: shared-date
        from: date
        on: date
    columns:
      date: 観測日
      issue_type: "銘柄種別（01-99 コード, 02-04=国債, 13=事業債/社債, 12=金融債, 15=転換社債, 17=円建外債 等）"
      code: 銘柄コード（JSDA 独自 9 桁）
      name: 銘柄名（cp932 decode 済 UTF-8）
      due_date: 償還期日
      coupon: 利率（%）
      "avg_compound_yield, avg_simple_yield, avg_price, avg_price_change": 平均値（複利/単利/単価/前日比）
      "high_*, low_*, median_*": 最高値・最低値・中央値の各指標
      n_reporters: 報告社数
      invalid_flag: チェックフラグ
    members_note: "A2 横断面アルファ検定用の TRACE 等価データ（~12,000 銘柄 × 月末）。"

  - key: jsda_matrix_monthend
    title: 日証協 格付マトリクス表（月末スナップショット）
    category: International
    provider: 日本証券業協会
    loader: "fi_research.data.jsda.load_monthend(kind='R')"
    files: ["jsda_matrix_monthend_*.parquet"]
    frequency: 月末日次
    upstream_url: https://market.jsda.or.jp/shijyo/saiken/baibai/baisanchi/files/{YYYY}/R{YYMMDD}.csv
    citation: "日本証券業協会 (JSDA), 格付マトリクス表。"
    license: public（再配布は出典明記要）
    caveats:
      - "格付 × 残存期間バケットの代表複利利回り集約表。1 月末あたり 80 行（rating agency × maturity bucket）。"
      - "CSV は cp932 (Shift-JIS) エンコーディング、ヘッダー無し 39 列。loader が long format に整形。"
      - "Moody's は小文字格付 (Aaa, Aa, A, Baa, Ba) を返す。他社 (R&I, JCR, S&P) は大文字 (AAA, AA, A, BBB, BB, B)。"
    usage: {A1: edge, A2: aux}
    relations:
      - to: jsda_monthend
        kind: shared-date
        from: date
        on: date
    columns:
      date: 観測日
      rating_agency_code: "格付機関コード (1=R&I, 3=JCR, 4=Moody's, 5=S&P)"
      rating_agency: 格付機関名 (cp932 → UTF-8 decode 済)
      maturity_year: 残存期間バケット (1-20 年)
      rating: 格付ラベル (AAA/AA/A/BBB/BB/B または Moody's の Aaa/Aa/A/Baa/Ba)
      mean_yield: 代表複利利回り 平均（%）
      std_yield: 同 標準偏差
      n_bonds: バケット内銘柄数
      face_value_oku: バケット内総額面（億円）
    members_note: "S-file の格付別ベンチマーク曲線として併用（個別社債リターン分解 / α テストの discount curve）。"

