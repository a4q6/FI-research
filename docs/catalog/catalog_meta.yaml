# =============================================================================
# データカタログ 知識層（単一の真実源）
#
# parquet から自動取得できない情報だけを手で書く: カテゴリ・提供者・頻度・URL・
# 引用・ライセンス注意・A1/A2 用途・カラム定義・リレーション。
# スキーマ / 行数 / 期間 / サイズは build 時に parquet から自動マージされる。
#
# 新しいソースを足したら: data/processed に parquet を置き、ここに 1 スタンザ追加。
# 未記載でも自動層で表示され "未ドキュメント" として警告される（ドリフト検知）。
#
# files:  data/processed からの相対 glob（複数可）
# usage:  A1 / A2 への寄与  core | aux | edge | none
# relations: 他データセットとの結合
#   - to: <dataset key>        遷移先
#     from / on: 結合キー（from=自テーブル列, on=相手列。省略時 date 軸）
#     kind: entity-bridge | shared-date | derived
# columns: 列名 -> 定義。`{01..30}` 等のレンジ表記で列族をまとめて記述可
# rebuild: python -m fi_research.catalog build
# =============================================================================

meta:
  updated: "2026-05-26"
  note: >
    公開・半公開データのみで構築する固定収益研究データ基盤のマスタカタログ。
    取得経路・スキーマ詳細は docs/data_sources.md、隠れた制約は
    memory/data_source_caveats.md を参照。

# カテゴリ表示順と色（HTML のグルーピング用）
categories:
  - {key: Rates,        label: 金利・期間構造,        color: "#2563eb"}
  - {key: Credit,       label: クレジット,            color: "#d97706"}
  - {key: Inflation,    label: インフレ・実質金利,    color: "#0891b2"}
  - {key: Macro,        label: マクロ・金融政策,      color: "#059669"}
  - {key: Vol,          label: ボラティリティ,        color: "#7c3aed"}
  - {key: Stress,       label: 金融ストレス,          color: "#db2777"}
  - {key: EquityFactor, label: 株式・クロスアセット,  color: "#ca8a04"}
  - {key: Dealer,       label: ディーラー・建玉,      color: "#0d9488"}
  - {key: Fundamentals, label: 発行体ファンダ・識別子, color: "#9333ea"}
  - {key: BondFactor,   label: 社債ファクター,        color: "#e11d48"}
  - {key: International, label: 海外・国際比較,        color: "#475569"}

# 未取得データ（取得可だが未実装 / 取得困難）。優先度は A1/A2 寄与で評価。
pending:
