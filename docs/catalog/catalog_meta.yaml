  - {data: "CIK ↔ ISIN マッピング", provider: "OpenFIGI Search / 別 DB", status: 取得可, priority: ★★, theme: A2, note: "Mapping API は ISIN を返さない。社債リターンとの橋に別経路が必要"}
  - {data: "FFIEC bank Call Reports (031/041)", provider: FFIEC CDR, status: 取得可, priority: ★, theme: A2, note: "銀行発行体に絞った社債分析時"}
  - {data: "MOVE 公式ソース移行 (ICE/Cboe)", provider: ICE, status: 取得可, priority: ★, theme: A1, note: "現在 Yahoo 経由。論文 reproducibility で公式へ"}
  - {data: "JKP Global Factor Data", provider: jkpfactors.com, status: "取得可(手動DL)", priority: ★, theme: A2, note: "153 factor × 93 国。free account 登録要"}
  - {data: "FRED-MD 132 系列", provider: McCracken-Ng, status: "取得可(手動DL)", priority: ★, theme: A1, note: "Akamai anti-bot で自動 fetch ブロック。FGX 候補ファクター拡張用"}
  - {data: "TRACE Standard / Enhanced", provider: "FINRA / WRDS", status: 取得困難, priority: ★★, theme: A2, note: "個別約定。WRDS（大学アカウント）待ち。A2 横断回帰・BBW 直接再現に必須"}
  - {data: "Mergent FISD", provider: WRDS, status: 取得困難, priority: ★★, theme: A2, note: "社債マスター（発行体/発行条件/格付履歴）"}
  - {data: "格付け別 OAS 長期 (1996-2023)", provider: ICE/BofA, status: 取得困難, priority: ★, theme: A2, note: "商用ライセンス。BAA10Y/AAA10Y で proxy"}
  - {data: "日証協 公社債店頭参考値", provider: 日証協, status: "取得可(scraping)", priority: ★★, theme: A2, note: "日本の per-bond daily 参考価格。A2 日本拡張の TRACE 相当"}

datasets:

  # ---- Rates ----------------------------------------------------------------
  - key: gsw_nominal
    title: GSW 名目ゼロクーポンイールドカーブ
    category: Rates
    provider: FRB Board (staff)
    loader: fi_research.data.treasury.load_gsw_nominal
    files: ["gsw_nominal.parquet"]
    frequency: 営業日次
    upstream_url: https://www.federalreserve.gov/data/yield-curve-tables/feds200628.csv
    citation: "Gürkaynak, Sack & Wright (2007), JME 54(8)."
    license: public
    caveats:
      - "BETA3 / TAU2 は 1980-01 以降のみ。1961-1979 は 4 パラメータ NS。"
    usage: {A1: core, A2: core}
    columns:
      date: 観測日（営業日）
      "BETA0..BETA3": Nelson-Siegel-Svensson パラメータ（level/slope/curvature/2nd hump）
      TAU1: NSS 減衰パラメータ 1
      TAU2: NSS 減衰パラメータ 2（1980- のみ）
      "SVENY{01..30}": ゼロクーポン利回り 満期 1-30y（連続複利, %）
      "SVENPY{01..30}": パー利回り 満期 1-30y（利付債等価, %）
      "SVENF{01..30}": 瞬間フォワードレート 満期 1-30y（連続複利, %）
      "SVEN1F{01,04,09}": 1 年先フォワード（利付債等価, %）

  - key: gsw_real
    title: GSW 実質(TIPS)ゼロクーポンイールドカーブ
    category: Rates
    provider: FRB Board (staff)
    loader: fi_research.data.treasury.load_gsw_real
    files: ["gsw_real.parquet"]
    frequency: 営業日次
    upstream_url: https://www.federalreserve.gov/data/yield-curve-tables/feds200805.csv
    citation: "Gürkaynak, Sack & Wright (2010), AEJ:Macro 2(1)."
    license: public
    caveats:
      - "breakeven は流動性・インフレリスクプレミアムを含み『期待インフレ』ではない（公式注記）。"
    usage: {A1: aux, A2: edge}
    columns:
      date: 観測日（営業日）
      "BETA0..BETA3": NSS パラメータ
      TAU1: NSS 減衰パラメータ 1
      TAU2: NSS 減衰パラメータ 2
      "TIPSY{02..20}": 実質ゼロ利回り 満期 2-20y
      "TIPSPY{02..20}": 実質パー利回り 満期 2-20y
      "TIPSF{02..20}": 実質瞬間フォワード 満期 2-20y
      "TIPS1F{02..09}": 実質 1 年先フォワード
      "TIPSF5F5": 実質 5y-5y フォワード（中期実質金利）
      "BKEVEN{02..20}": 名目−実質のインフレ補償（breakeven）
      "BKEVEN5F5": 5y-5y フォワード breakeven

  - key: fred_rates
    title: FRED 金利（CMT・政策金利・期間スプレッド）
    category: Rates
    provider: FRED (St. Louis Fed)
    loader: fi_research.data.fred.load_panel
    files: ["fred_DGS*.parquet", "fred_DFF.parquet", "fred_SOFR.parquet", "fred_T10Y2Y.parquet", "fred_T10Y3M.parquet"]
    frequency: 日次
    upstream_url: https://fred.stlouisfed.org/
    citation: "Federal Reserve Bank of St. Louis, FRED."
    license: public (要 API key)
    usage: {A1: core, A2: aux}
    columns:
      date: 観測日
      value: 値（`.` は NaN 変換済）
      series_id: FRED シリーズ ID
    members_note: "メンバー = 各 FRED シリーズ。DGS3MO-DGS30=国債 CMT、T10Y2Y/T10Y3M=期間スプレッド、DFF/SOFR=政策金利。"

  # ---- Credit ---------------------------------------------------------------
  - key: frb_ebp
    title: FRB Excess Bond Premium / GZ スプレッド
    category: Credit
    provider: FRB Board
    loader: fi_research.data.frb_ebp.load_ebp
    files: ["frb_ebp.parquet"]
    frequency: 月次
    upstream_url: https://www.federalreserve.gov/econres/notes/feds-notes/ebp_csv.csv
    citation: "Favara, Gilchrist, Lewis & Zakrajšek (2016) FEDS Notes / Gilchrist & Zakrajšek (2012) AER 102(4)."
    license: public
    usage: {A1: core, A2: core}
    columns:
      date: 月初日付
      gz_spread: GZ スプレッド（社債利回り − リスクフリー）
      ebp: Excess Bond Premium（GZ から予想デフォルト成分を控除した残差）
      est_prob: 12ヶ月先リセッション確率の推定値

  - key: fred_credit_oas
    title: FRED クレジット OAS（ICE BofA）+ Moody レガシー
    category: Credit
    provider: FRED (ICE BofA / Moody's)
    loader: fi_research.data.fred.load_panel
    files: ["fred_BAMLC*.parquet", "fred_BAMLH*.parquet", "fred_BAA10Y.parquet", "fred_AAA10Y.parquet"]
    frequency: 日次
    upstream_url: https://fred.stlouisfed.org/
    citation: "ICE BofA Indices via FRED / Moody's Seasoned Corporate."
    license: "ICE BofA OAS は過去 5 年のみ（ライセンス制約）"
    caveats:
      - "BAMLC* / BAMLH* は ICE ライセンスで直近 5 年だけ。長期は BAA10Y / AAA10Y で proxy。"
    usage: {A1: aux, A2: aux}
    columns:
      date: 観測日
      value: OAS / スプレッド（bp 系, %）
      series_id: "BAMLC0A0CM=IG全体, BAMLC0A1CAAA..4CBBB=IG格付別, BAMLH0A0HYM2=HY全体, BAMLH0A1..3=HY格付別, BAA10Y/AAA10Y=Moody'sレガシー"

  # ---- Inflation ------------------------------------------------------------
  - key: fred_inflation
    title: FRED インフレ・実質金利（TIPS / breakeven / 物価指数）
    category: Inflation
    provider: FRED
    loader: fi_research.data.fred.load_panel
    files: ["fred_DFII*.parquet", "fred_T5YIE.parquet", "fred_T10YIE.parquet", "fred_T5YIFR.parquet", "fred_CPIAUCSL.parquet", "fred_PCEPI.parquet"]
    frequency: 日次/月次
    upstream_url: https://fred.stlouisfed.org/
    citation: "Federal Reserve Bank of St. Louis, FRED."
    license: public
    usage: {A1: aux, A2: edge}
    columns:
      date: 観測日
      value: 値
      series_id: "DFII5..30=TIPS CMT, T5YIE/T10YIE=breakeven, T5YIFR=5y5y forward, CPIAUCSL/PCEPI=物価指数(SA)"

  # ---- Macro ----------------------------------------------------------------
  - key: fred_macro
    title: FRED マクロ実体（生産・労働・GDP・NBER）
    category: Macro
    provider: FRED
    loader: fi_research.data.fred.load_panel
    files: ["fred_INDPRO.parquet", "fred_UNRATE.parquet", "fred_PAYEMS.parquet", "fred_GDPC1.parquet", "fred_USREC.parquet", "fred_WALCL.parquet"]
    frequency: 月次/四半期/週次
    upstream_url: https://fred.stlouisfed.org/
    citation: "Federal Reserve Bank of St. Louis, FRED."
    license: public
    usage: {A1: core, A2: aux}
    columns:
      date: 観測日
      value: 値
      series_id: "INDPRO=鉱工業生産, UNRATE=失業率, PAYEMS=非農業雇用, GDPC1=実質GDP, USREC=NBERリセッションダミー(0/1), WALCL=FRB総資産(QE)"

  - key: mp_shocks
    title: Bauer-Swanson 金融政策サプライズ（MPS）
    category: Macro
    provider: SF Fed (Bauer-Swanson)
    loader: fi_research.data.mp_shocks.load_mp_shocks
    files: ["mp_shocks_*.parquet"]
    frequency: FOMC / 月次
    upstream_url: https://www.frbsf.org/wp-content/uploads/monetary-policy-surprises-data.xlsx
    citation: "Bauer & Swanson (2023), NBER Macro Annual."
    license: public
    usage: {A1: core, A2: aux}
    columns:
      date: イベント日 / 月
      mps: "MPS = FF1/FF2/ED1-4 の第一主成分（標準的 MP shock）"
      mps_orth: MPS から CB info effect を直交化した残差（推奨ショック）
      "ff1, ff2": Fed Funds 第 1/2 contract のサプライズ
      "ed1..ed4": Eurodollar 1-4 quarter ahead サプライズ
      "tnote02, tnote05, tnote10, tbond": 国債利回り変化
      sp500: 株式サプライズ
      nfp_surp: 直前の payrolls サプライズ
    members_note: "fomc_2023update / monthly_2023update（更新版）, fomc_original / monthly_original（元論文版・SVAR用マクロ込み）。"

  # ---- Vol ------------------------------------------------------------------
  - key: fred_vol
    title: FRED ボラティリティ（VIX / OVX）
    category: Vol
    provider: FRED (CBOE)
    loader: fi_research.data.fred.load_panel
    files: ["fred_VIXCLS.parquet", "fred_OVXCLS.parquet"]
    frequency: 日次
    upstream_url: https://fred.stlouisfed.org/
    citation: "CBOE via FRED."
    license: public
    usage: {A1: core, A2: aux}
    columns:
      date: 観測日
      value: インデックス値
      series_id: "VIXCLS=株式 vol, OVXCLS=原油 vol"

  - key: move
    title: ICE BofA MOVE Index（金利ボラティリティ）
    category: Vol
    provider: ICE BofA (Yahoo Finance 経由)
    loader: fi_research.data.move.load_move
    files: ["move.parquet"]
    frequency: 営業日次
    upstream_url: https://query2.finance.yahoo.com/v8/finance/chart/%5EMOVE
    citation: "ICE BofA MOVE Index."
    license: "Yahoo 配信。論文 reproducibility では ICE 公式へ移行推奨。"
    caveats:
      - "Yahoo chart API は仕様変更が時々入る（v7 CSV は 2025 年に 401 化）。"
    usage: {A1: core, A2: aux}
    columns:
      date: 観測日
      close: MOVE Index 終値（金利 implied vol, bp 換算）

  # ---- Stress ---------------------------------------------------------------
  - key: ofr_fsi
    title: OFR Financial Stress Index（総合+5カテゴリ+3地域）
    category: Stress
    provider: OFR (US Treasury)
    loader: fi_research.data.ofr_fsi.load_ofr_fsi
    files: ["ofr_fsi.parquet"]
    frequency: 営業日次
    upstream_url: https://www.financialresearch.gov/financial-stress-index/data/fsi.csv
    citation: "Monin (2019), 'The OFR Financial Stress Index', Risks 7(1):25."
    license: public
    usage: {A1: core, A2: core}
    columns:
      date: 観測日（営業日）
      ofr_fsi: 総合指数（z-score, ~0 が長期平均, 正で stress 上昇）
      credit: クレジット系サブインデックス（OAS, CDS 等）
      equity_valuation: 株式バリュエーション（P/E, ERP 等）
      safe_assets: 安全資産需要（実質金利, term premium 等）
      funding: 短期ファンディング（LIBOR-OIS, TED 等）
      volatility: 暗黙ボラ（VIX, MOVE 等）
      "united_states, other_advanced_economies, emerging_markets": 地域別寄与

  - key: fred_fin_conditions
    title: FRED 金融状況指数（NFCI / ANFCI / STLFSI4）
    category: Stress
    provider: FRED (Chicago / St. Louis Fed)
    loader: fi_research.data.fred.load_panel
    files: ["fred_NFCI.parquet", "fred_ANFCI.parquet", "fred_STLFSI4.parquet"]
    frequency: 週次
    upstream_url: https://fred.stlouisfed.org/
    citation: "Chicago Fed (NFCI/ANFCI), St. Louis Fed (STLFSI4)."
    license: public
    usage: {A1: aux, A2: aux}
    columns:
      date: 観測日
      value: 指数値
      series_id: "NFCI=Chicago金融状況, ANFCI=調整版, STLFSI4=St.Louis金融ストレス"

  # ---- Equity / cross-asset factors ----------------------------------------
  - key: kf_factors
    title: Kenneth French FF5 + Momentum
    category: EquityFactor
    provider: Kenneth French Data Library
    loader: fi_research.data.kenneth_french.load_dataset
    files: ["kf_ff5_monthly.parquet", "kf_ff5_daily.parquet", "kf_mom_monthly.parquet", "kf_mom_daily.parquet"]
    frequency: 月次/日次
    upstream_url: https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/
    citation: "Fama & French (1993, 2015); Carhart (1997)."
    license: public
    usage: {A1: aux, A2: core}
    columns:
      date: 月初日付 / 取引日
      "Mkt-RF": 市場超過リターン（%）
      "SMB, HML, RMW, CMA": Size / Value / Profitability / Investment（%）
      Mom: Momentum（%, mom データセット）
      RF: 1ヶ月 T-bill（%, FF5 データセット）
    members_note: "値はパーセント単位（-0.39 = -0.39%）。"

  - key: kf_industries
    title: Kenneth French 業種ポートフォリオ（12/30/49 業種）
    category: EquityFactor
    provider: Kenneth French Data Library
    loader: fi_research.data.kenneth_french.load_dataset
    files: ["kf_ind12_*.parquet", "kf_ind30_*.parquet", "kf_ind49_*.parquet"]
    frequency: 月次/日次
    upstream_url: https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/
    citation: "Kenneth R. French Data Library."
    license: public
    usage: {A1: edge, A2: aux}
    columns:
      date: 月初日付 / 取引日
      "<industry>": 各業種の value-weighted リターン（%）
    members_note: "EDGAR の SIC コードと組み合わせて業種コントロール。ラベル対応は KF の Detail PDF 参照。"

  - key: aqr_factors
    title: AQR 公開ファクター（BAB / QMJ / Century / TSMOM）
    category: EquityFactor
    provider: AQR Capital Management
    loader: fi_research.data.aqr.load_aqr
    files: ["aqr_bab_equity.parquet", "aqr_qmj.parquet", "aqr_century_premia.parquet", "aqr_tsmom.parquet"]
    frequency: 月次
    upstream_url: https://www.aqr.com/Insights/Datasets
    citation: "Frazzini & Pedersen (2014); Asness, Frazzini & Pedersen (2019)."
    license: public (研究利用)
    usage: {A1: edge, A2: aux}
    members_note: "BAB Equity(各国+global), Quality-Minus-Junk, Century of Factor Premia(45 factor), Time-Series Momentum。章7 robustness で社債 α の独立性検定に。"

  # ---- Dealer ---------------------------------------------------------------
  - key: ny_fed_pd
    title: NY Fed Primary Dealer Statistics (FR2004)
    category: Dealer
    provider: NY Fed Markets
    loader: fi_research.data.ny_fed_pd.load_pd_timeseries
    files: ["ny_fed_pd_timeseries.parquet", "ny_fed_pd_catalog.parquet", "ny_fed_pd_asofs.parquet"]
    frequency: 週次
    upstream_url: https://markets.newyorkfed.org/api/pd/
    citation: "FRBNY, Primary Dealer Statistics (FR2004)."
    license: public (User-Agent 必須)
    caveats:
      - "catalog は現行 SBN2024 のみ。旧 seriesbreak の 751 keyid は description 欠落。"
    usage: {A1: aux, A2: core}
    columns:
      as_of_date: 報告対象日（通常水曜）
      keyid: "シリーズ ID（PDPOS*=net position, PDTRAN*=取引高, PDFTR*=repo, PDFTD*=fails）"
      value_millions: 金額（百万ドル, ポジション系は long-short）
      seriesbreak: taxonomy バージョン（catalog/asofs）
      description: シリーズ説明（catalog）
    members_note: "timeseries=本体(long), catalog=keyid説明, asofs=日付→seriesbreak。3 テーブルで構成。"

  - key: cftc_tff
    title: CFTC Traders in Financial Futures (TFF)
    category: Dealer
    provider: U.S. CFTC
    loader: fi_research.data.cftc_tff.load_all
    files: ["cftc_tff_*.parquet"]
    frequency: 週次
    upstream_url: https://www.cftc.gov/files/dea/history/
    citation: "CFTC, Commitments of Traders — Traders in Financial Futures."
    license: public
    usage: {A1: aux, A2: aux}
    columns:
      market: 市場名（例 10-YEAR U.S. TREASURY NOTES）
      report_date: 報告対象日（火曜）
      "Dealer_Positions_{Long,Short,Spread}_All": ディーラー建玉
      "Asset_Mgr_Positions_*": アセットマネージャー（real money）
      "Lev_Money_Positions_*": レバレッジマネー（ヘッジファンド）
      "Other_Rept_*, NonRept_*": その他 / 非報告
      Open_Interest_All: 総建玉
    members_note: "年次 XLS shard（2010-）。cftc_tff.parquet は全結合済。5 区分でポジション公開。"

  # ---- Fundamentals / identifiers -------------------------------------------
  - key: edgar
    title: SEC EDGAR Financial Statement Data Sets
    category: Fundamentals
    provider: SEC DERA
    loader: fi_research.data.edgar.load_concat
    files: ["edgar/*.parquet"]
    representative: "edgar/2025q3_sub.parquet"
    coverage: false
    frequency: 四半期
    upstream_url: https://www.sec.gov/dera/data/financial-statement-data-sets
    citation: "U.S. SEC, Financial Statement Data Sets."
    license: public (User-Agent 必須)
    caveats:
      - "num.txt は 100MB+/quarter。69 quarters 全結合は数 GB。必要四半期だけ filter 推奨。"
    usage: {A1: aux, A2: core}
    columns:
      adsh: accession number（filing 一意 ID, num/tag と join）
      cik: 企業 CIK（sec_tickers と join）
      name: 企業名
